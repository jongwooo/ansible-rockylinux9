---
- name: Stop PostgreSQL on standby before cloning
  ansible.builtin.systemd:
    name: "{{ postgresql_service }}"
    state: stopped

- name: Check if standby is already cloned
  ansible.builtin.stat:
    path: "{{ postgresql_data_dir }}/PG_VERSION"
  register: standby_pgdata

- name: Clean data directory before clone
  ansible.builtin.file:
    path: "{{ postgresql_data_dir }}"
    state: absent
  when: not standby_pgdata.stat.exists or standby_pgdata.stat.exists

- name: Clean WAL directory before clone
  ansible.builtin.file:
    path: "{{ postgresql_wal_dir }}"
    state: absent

- name: Recreate data directory
  ansible.builtin.file:
    path: "{{ postgresql_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Recreate WAL directory
  ansible.builtin.file:
    path: "{{ postgresql_wal_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Determine primary host
  ansible.builtin.set_fact:
    _repmgr_primary_host: >-
      {{ hostvars[groups['db'] | reject('equalto', inventory_hostname) | first]['ansible_host'] }}

- name: Clone standby from primary using repmgr
  ansible.builtin.command: >
    /usr/pgsql-{{ postgresql_version }}/bin/repmgr
    -h {{ _repmgr_primary_host }}
    -U {{ repmgr_user }}
    -d {{ repmgr_db }}
    -f /etc/repmgr/{{ postgresql_version }}/repmgr.conf
    standby clone
  become_user: postgres
  environment:
    PGPASSWORD: "{{ repmgr_password }}"

- name: Create systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/{{ postgresql_service }}.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Override PGDATA in systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/{{ postgresql_service }}.service.d/override.conf
    content: |
      [Service]
      Environment=PGDATA={{ postgresql_data_dir }}
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Start PostgreSQL on standby
  ansible.builtin.systemd:
    name: "{{ postgresql_service }}"
    state: started
    enabled: true

- name: Register standby node
  ansible.builtin.command: >
    /usr/pgsql-{{ postgresql_version }}/bin/repmgr
    -f /etc/repmgr/{{ postgresql_version }}/repmgr.conf
    standby register --force
  become_user: postgres
  environment:
    PGPASSWORD: "{{ repmgr_password }}"
  changed_when: false

- name: Enable and start repmgrd service
  ansible.builtin.systemd:
    name: repmgr-{{ postgresql_version }}
    state: started
    enabled: true
