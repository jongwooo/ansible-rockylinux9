---
- name: Check current SELinux status
  ansible.builtin.command: getenforce
  register: selinux_status
  changed_when: false
  failed_when: false

- name: Disable SELinux in config
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX='
    line: 'SELINUX=disabled'
  when: selinux_status.stdout != 'Disabled'

- name: Disable SELinux immediately
  ansible.builtin.command: setenforce 0
  when: selinux_status.stdout != 'Disabled'
  changed_when: true

- name: Reboot to apply SELinux disable permanently
  ansible.builtin.reboot:
    reboot_timeout: 300
  when:
    - selinux_status.stdout in ['Enforcing', 'Permissive']
    - ansible_connection != 'local'

- name: Wait for host to be available after reboot
  ansible.builtin.wait_for_connection:
    timeout: 300
    delay: 10
  when:
    - selinux_status.stdout in ['Enforcing', 'Permissive']
    - ansible_connection != 'local'
