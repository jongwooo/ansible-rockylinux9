---
- name: Set INPUT chain default policy to ACCEPT before flush
  ansible.builtin.iptables:
    chain: INPUT
    policy: ACCEPT

- name: Flush INPUT chain
  ansible.builtin.iptables:
    chain: INPUT
    flush: true

- name: Allow established and related connections
  ansible.builtin.iptables:
    chain: INPUT
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "Allow established connections"

- name: Allow loopback traffic
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: lo
    jump: ACCEPT
    comment: "Allow loopback"

- name: Allow SSH (port {{ ansible_port }})
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ ansible_port }}"
    jump: ACCEPT
    comment: "Allow SSH"

- name: Allow tier-specific ports
  ansible.builtin.iptables:
    chain: INPUT
    protocol: "{{ item.protocol | default('tcp') }}"
    destination_port: "{{ item.port }}"
    source: "{{ item.source | default(omit) }}"
    jump: ACCEPT
    comment: "{{ item.comment }}"
  loop: "{{ (iptables_rules | default([])) + (iptables_host_rules | default([])) }}"

- name: Set INPUT chain default policy to DROP
  ansible.builtin.iptables:
    chain: INPUT
    policy: DROP

- name: Save iptables rules
  ansible.builtin.command: service iptables save
  changed_when: true

- name: Enable and start iptables
  ansible.builtin.systemd:
    name: iptables
    state: started
    enabled: true
