---
java_packages:
  - java-21-openjdk
  - java-21-openjdk-devel
java_home: /usr/lib/jvm/java-21-openjdk

tomcat_version: 11.0.21
tomcat_user: tomcat
tomcat_group: tomcat
tomcat_install_dir: /opt/tomcat
tomcat_archive_url: "https://archive.apache.org/dist/tomcat/tomcat-11/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
tomcat_archive_dest: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
tomcat_service_name: tomcat
tomcat_http_port: 8080
tomcat_ajp_port: 8009

# Application
tomcat_app_url: https://github.com/jongwooo/shoppingmall/releases/download/latest/ROOT.war

# DataSource
tomcat_ds_name: jdbc/shoppingmall
tomcat_ds_driver: org.postgresql.Driver
tomcat_ds_url: "jdbc:postgresql://{{ vault_db_host }}:{{ vault_db_port }}/{{ vault_db_name }}?currentSchema={{ vault_db_schema }}"
tomcat_ds_username: "{{ vault_db_username }}"
tomcat_ds_password: "{{ vault_db_password }}"
tomcat_ds_max_total: 10
tomcat_ds_max_idle: 5
tomcat_ds_min_idle: 2

# Clustering
tomcat_cluster_enabled: true
tomcat_cluster_receiver_port: 4000
