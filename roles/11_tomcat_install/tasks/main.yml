---
- name: Create tomcat group
  ansible.builtin.group:
    name: "{{ tomcat_group }}"
    system: true
    state: present

- name: Create tomcat user
  ansible.builtin.user:
    name: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    home: "{{ tomcat_install_dir }}"
    shell: /bin/bash
    system: true
    create_home: false
    password: "{{ vault_service_user_password | password_hash('sha512', 'svcusr2026') }}"
    update_password: on_create
    state: present

- name: Create tomcat install directory
  ansible.builtin.file:
    path: "{{ tomcat_install_dir }}"
    state: directory
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    mode: "0755"

- name: Download Tomcat {{ tomcat_version }} archive
  ansible.builtin.get_url:
    url: "{{ tomcat_archive_url }}"
    dest: "{{ tomcat_archive_dest }}"
    mode: "0644"

- name: Extract Tomcat archive
  ansible.builtin.unarchive:
    src: "{{ tomcat_archive_dest }}"
    dest: "{{ tomcat_install_dir }}"
    remote_src: true
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    extra_opts:
      - --strip-components=1
    creates: "{{ tomcat_install_dir }}/bin/catalina.sh"

- name: Deploy server.xml with clustering configuration
  ansible.builtin.template:
    src: server.xml.j2
    dest: "{{ tomcat_install_dir }}/conf/server.xml"
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    mode: "0600"
  notify: Restart tomcat

- name: Deploy context.xml with DataSource configuration
  ansible.builtin.template:
    src: context.xml.j2
    dest: "{{ tomcat_install_dir }}/conf/context.xml"
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    mode: "0600"
  notify: Restart tomcat

- name: Check if default ROOT index.html exists
  ansible.builtin.stat:
    path: "{{ tomcat_install_dir }}/webapps/ROOT/index.html"
  register: default_root

- name: Remove default ROOT application
  ansible.builtin.file:
    path: "{{ tomcat_install_dir }}/webapps/ROOT"
    state: absent
  when: default_root.stat.exists and default_root.stat.size < 20000

- name: Deploy ROOT.war application
  ansible.builtin.get_url:
    url: "{{ tomcat_app_url }}"
    dest: "{{ tomcat_install_dir }}/webapps/ROOT.war"
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    mode: "0644"
  notify: Restart tomcat

- name: Install Tomcat systemd unit file
  ansible.builtin.template:
    src: tomcat.service.j2
    dest: "/etc/systemd/system/{{ tomcat_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart tomcat

- name: Enable and start Tomcat service
  ansible.builtin.systemd:
    name: "{{ tomcat_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
