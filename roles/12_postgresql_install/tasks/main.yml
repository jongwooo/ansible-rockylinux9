---
- name: Install PostgreSQL repository
  ansible.builtin.package:
    name: https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-aarch64/pgdg-redhat-repo-latest.noarch.rpm
    state: present
    disable_gpg_check: true

- name: Install PostgreSQL {{ postgresql_version }} server
  ansible.builtin.package:
    name: postgresql{{ postgresql_version }}-server
    state: present

- name: Configure postgres user for login
  ansible.builtin.user:
    name: postgres
    shell: /bin/bash
    password: "{{ vault_service_user_password | password_hash('sha512', 'svcusr2026') }}"
    update_password: on_create

- name: Create .ssh directory for postgres
  ansible.builtin.file:
    path: /var/lib/pgsql/.ssh
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Generate SSH key for postgres user
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -f /var/lib/pgsql/.ssh/id_ed25519 -N ""
    creates: /var/lib/pgsql/.ssh/id_ed25519
  become_user: postgres

- name: Read postgres public key
  ansible.builtin.slurp:
    src: /var/lib/pgsql/.ssh/id_ed25519.pub
  register: postgres_ssh_pubkey

- name: Distribute SSH public keys across DB nodes
  ansible.posix.authorized_key:
    user: postgres
    key: "{{ hostvars[item]['postgres_ssh_pubkey']['content'] | b64decode }}"
    state: present
  loop: "{{ groups['db'] }}"

- name: Create PostgreSQL data directory
  ansible.builtin.file:
    path: "{{ postgresql_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Create PostgreSQL WAL directory
  ansible.builtin.file:
    path: "{{ postgresql_wal_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Create systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/{{ postgresql_service }}.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Override PGDATA in systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/{{ postgresql_service }}.service.d/override.conf
    content: |
      [Service]
      Environment=PGDATA={{ postgresql_data_dir }}
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

# Primary only: initdb, config, service start
- name: Check if PostgreSQL database is initialized
  ansible.builtin.stat:
    path: "{{ postgresql_data_dir }}/PG_VERSION"
  register: pgdata
  when: postgresql_role == 'primary'

- name: Check if WAL directory has existing data
  ansible.builtin.find:
    paths: "{{ postgresql_wal_dir }}"
    file_type: any
  register: wal_contents
  when: postgresql_role == 'primary' and not pgdata.stat.exists

- name: Initialize PostgreSQL database
  ansible.builtin.command: >
    /usr/pgsql-{{ postgresql_version }}/bin/initdb
    -D {{ postgresql_data_dir }}
    --waldir={{ postgresql_wal_dir }}
  become_user: postgres
  when: >
    postgresql_role == 'primary'
    and not pgdata.stat.exists
    and wal_contents.matched == 0

- name: Configure PostgreSQL to listen on all interfaces
  ansible.builtin.lineinfile:
    path: "{{ postgresql_data_dir }}/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  notify: Restart postgresql
  when: postgresql_role == 'primary'

- name: Configure PostgreSQL to use port {{ postgresql_port }}
  ansible.builtin.lineinfile:
    path: "{{ postgresql_data_dir }}/postgresql.conf"
    regexp: "^#?port"
    line: "port = {{ postgresql_port }}"
  notify: Restart postgresql
  when: postgresql_role == 'primary'

- name: Allow WAS network access in pg_hba.conf
  ansible.builtin.lineinfile:
    path: "{{ postgresql_data_dir }}/pg_hba.conf"
    regexp: "^host\\s+all\\s+all\\s+{{ postgresql_allowed_network | regex_escape }}"
    line: "host    all    all    {{ postgresql_allowed_network }}    scram-sha-256"
  notify: Restart postgresql
  when: postgresql_role == 'primary'

- name: Enable and start PostgreSQL service
  ansible.builtin.systemd:
    name: "{{ postgresql_service }}"
    state: started
    enabled: true
  when: postgresql_role == 'primary'
