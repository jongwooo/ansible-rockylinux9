---
- name: Check current timezone
  ansible.builtin.command: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false
  failed_when: false

- name: "Set timezone to {{ timezone }}"
  ansible.builtin.command:
    cmd: "timedatectl set-timezone {{ timezone }}"
  when: current_timezone.stdout != timezone
  changed_when: true

- name: Check if chronyd is running
  ansible.builtin.command: systemctl is-active chronyd
  register: chronyd_status
  changed_when: false
  failed_when: false

- name: Enable and start chronyd
  ansible.builtin.systemd:
    name: chronyd
    state: started
    enabled: true
  when: chronyd_status.stdout != 'active'

- name: Force immediate time synchronization
  ansible.builtin.command: chronyc makestep
  changed_when: true
