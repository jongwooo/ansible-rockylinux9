---
- name: Create nginx group
  ansible.builtin.group:
    name: "{{ nginx_group }}"
    system: true
    state: present

- name: Create nginx user
  ansible.builtin.user:
    name: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    home: "{{ nginx_install_dir }}"
    shell: /bin/bash
    system: true
    create_home: false
    password: "{{ vault_service_user_password | password_hash('sha512', 'svcusr2026') }}"
    update_password: on_create
    state: present

- name: Download Nginx source
  ansible.builtin.get_url:
    url: "{{ nginx_src_url }}"
    dest: "{{ nginx_build_dir }}/nginx-{{ nginx_version }}.tar.gz"
    mode: "0644"

- name: Extract Nginx source
  ansible.builtin.unarchive:
    src: "{{ nginx_build_dir }}/nginx-{{ nginx_version }}.tar.gz"
    dest: "{{ nginx_build_dir }}"
    remote_src: true
    creates: "{{ nginx_build_dir }}/nginx-{{ nginx_version }}/configure"

- name: Configure Nginx build
  ansible.builtin.command:
    cmd: >
      ./configure
      --prefix={{ nginx_install_dir }}
      --user={{ nginx_user }}
      --group={{ nginx_group }}
      --with-http_ssl_module
      --with-pcre
    chdir: "{{ nginx_build_dir }}/nginx-{{ nginx_version }}"
    creates: "{{ nginx_build_dir }}/nginx-{{ nginx_version }}/objs/Makefile"

- name: Build and install Nginx
  ansible.builtin.shell:
    cmd: make && make install
    chdir: "{{ nginx_build_dir }}/nginx-{{ nginx_version }}"
    creates: "{{ nginx_install_dir }}/sbin/nginx"

- name: Create SSL certificate directory
  ansible.builtin.file:
    path: "{{ nginx_ssl_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Generate self-signed SSL private key
  ansible.builtin.command:
    cmd: openssl genrsa -out {{ nginx_ssl_key }} 2048
    creates: "{{ nginx_ssl_key }}"

- name: Generate self-signed SSL certificate
  ansible.builtin.command:
    cmd: >
      openssl req -new -x509
      -key {{ nginx_ssl_key }}
      -out {{ nginx_ssl_cert }}
      -days 365
      -subj "/C={{ nginx_ssl_country }}/O={{ nginx_ssl_org }}/CN={{ nginx_ssl_cn }}"
    creates: "{{ nginx_ssl_cert }}"

- name: Set permissions on SSL private key
  ansible.builtin.file:
    path: "{{ nginx_ssl_key }}"
    owner: root
    group: root
    mode: "0600"

- name: Deploy Nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ nginx_install_dir }}/conf/nginx.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Install Nginx systemd unit file
  ansible.builtin.template:
    src: nginx.service.j2
    dest: /etc/systemd/system/nginx.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Enable and start Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
    daemon_reload: true
